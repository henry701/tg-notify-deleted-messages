variables:
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_BUILDKIT: "1"
  CONTAINER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  CONTAINER_LATEST: $CI_REGISTRY_IMAGE:latest
  CONTAINER_CACHE_DEFAULT: $CI_REGISTRY_IMAGE:buildcache-$CI_DEFAULT_BRANCH
  CONTAINER_CACHE_BRANCH: $CI_REGISTRY_IMAGE:buildcache-$CI_COMMIT_REF_SLUG
  PYTHONPATH: "/app/src"

stages:
  - build
  - test
  - push

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

docker-build:
  stage: build
  image: docker:25
  services:
    - docker:25-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker context create ci-dind-context || true
    - docker buildx create ci-dind-context --name ci-builder --driver docker-container --use || docker buildx use ci-builder
    - docker buildx inspect --bootstrap
  script:
    - |
      set -- \
        --target nginx-runner \
        --tag "$CONTAINER_IMAGE" \
        --tag "$CONTAINER_LATEST" \
        --cache-to "type=registry,ref=$CONTAINER_CACHE_BRANCH,mode=max" \
        --output type=docker

      if docker buildx imagetools inspect "$CONTAINER_CACHE_BRANCH" >/dev/null 2>&1; then
        set -- "$@" --cache-from "type=registry,ref=$CONTAINER_CACHE_BRANCH"
      fi
      if docker buildx imagetools inspect "$CONTAINER_CACHE_DEFAULT" >/dev/null 2>&1; then
        set -- "$@" --cache-from "type=registry,ref=$CONTAINER_CACHE_DEFAULT"
      fi

      docker buildx build \
        "$@" \
        .
    - docker save $CONTAINER_IMAGE $CONTAINER_LATEST -o container-image.tar
  after_script:
    - docker buildx rm ci-builder || true
  artifacts:
    paths:
      - container-image.tar
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# Template for containerized tests
.test-containerized:
  stage: test
  image: $CONTAINER_IMAGE
  needs:
    - job: docker-build
      artifacts: true
  before_script:
    - pip install --no-cache-dir pytest -q
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

unit-tests:
  extends: .test-containerized
  variables:
    DATABASE_URL: "sqlite:///test.db"
  script:
    - python -m pytest $CI_PROJECT_DIR/tests -k 'test_' -v

integration-sqlite:
  extends: .test-containerized
  variables:
    INTEGRATION_DATABASE_URL: "sqlite+pysqlite:////tmp/tgdel-integration.sqlite3"
  script:
    - rm -f /tmp/tgdel-integration.sqlite3
    - python -m pytest $CI_PROJECT_DIR/tests -k 'integration_' -v

integration-postgres:
  extends: .test-containerized
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_DB: postgres
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    INTEGRATION_DATABASE_URL: "postgresql+psycopg://postgres:postgres@postgres:5432/postgres"
  before_script:
    - pip install --no-cache-dir pytest -q
    - |
      # Wait for postgres to be ready
      for i in $(seq 1 60); do
        if apk add --no-cache postgresql-client >/dev/null 2>&1 && pg_isready -h postgres -p 5432 -U postgres 2>/dev/null; then
          echo "Postgres is ready after $i attempt(s)."
          break
        fi
        if [ "$i" -eq 60 ]; then
          echo "Postgres never became ready"
          exit 1
        fi
        sleep 1
      done
  script:
    - python -m pytest $CI_PROJECT_DIR/tests -k 'integration_' -v

docker-push:
  stage: push
  image: docker:25
  services:
    - docker:25-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
  needs:
    - job: docker-build
      artifacts: true
    - job: unit-tests
    - job: integration-sqlite
    - job: integration-postgres
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker load -i container-image.tar
    - docker push $CONTAINER_IMAGE
    - docker push $CONTAINER_LATEST
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
