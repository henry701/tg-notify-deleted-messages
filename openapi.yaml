openapi: 3.0.3
info:
  title: tg-notify-deleted-messages API
  version: 1.0.0
paths:
  /send_code:
    get:
      summary: Send code request
      description: This endpoint triggers the sending of a code request to the user's devices for logging into Telegram.
      responses:
        '204':
          description: Code sent successfully
        '500':
          description: Internal server error
  /auth:
    get:
      summary: Authenticate user with code or password
      description: Authenticates a user by accepting either a code or password, but not both. 
      parameters:
        - name: code
          in: query
          description: The authentication code sent to the user after calling the /send_code endpoint.
          required: false
          schema:
            type: string
        - name: password
          in: query
          description: The user's password for authentication, if they have a password registered with Telegram. Must be sent on a second request, after validating the code.
          required: false
          schema:
            type: string
      responses:
        '204':
          description: Authentication successful
        '400':
          description: Both code and password are present. Either one or the other should be provided.
        '401':
          description: |
            - Code or password missing when it's required for this request.
            - Unregistered or duplicate authentication key (needs logoff to reset).
            - Password needed for authentication (send another request with the password!).
        '403':
          description: Missing both code and password.
        '500':
          description: Unknown error during authentication or possible bug.
  /logout:
    get:
      summary: Logout the user
      description: Logs out the user and terminates the client connection.
      responses:
        '204':
          description: Logout successful
        '500':
          description: Internal server error
  /preload_checkpoints:
    get:
      summary: List preload checkpoints
      description: Returns the current per-dialog preload checkpoints stored in the database.
      responses:
        '200':
          description: Checkpoints returned successfully
  /preload_checkpoints/set:
    post:
      summary: Set or overwrite one preload checkpoint
      description: |
        Sets a per-dialog preload checkpoint. Target the dialog with either `chat_peer_id`
        or `peer_id` plus `peer_type`. `timestamp` must be an ISO-8601 datetime with timezone.
        `message_id` is optional and can be omitted for timestamp-only checkpoints.
      parameters:
        - name: chat_peer_id
          in: query
          required: false
          schema:
            type: integer
        - name: peer_id
          in: query
          required: false
          schema:
            type: integer
        - name: peer_type
          in: query
          required: false
          schema:
            type: string
        - name: timestamp
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: message_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Checkpoint stored successfully
        '400':
          description: Invalid query parameters
        '404':
          description: Peer could not be resolved to a known chat
  /preload_checkpoints/clear:
    post:
      summary: Clear preload checkpoints
      description: |
        Clears either all checkpoints or one targeted checkpoint. If no dialog target is
        provided, all checkpoints are removed. To target one dialog, provide either
        `chat_peer_id` or `peer_id` plus `peer_type`.
      parameters:
        - name: chat_peer_id
          in: query
          required: false
          schema:
            type: integer
        - name: peer_id
          in: query
          required: false
          schema:
            type: integer
        - name: peer_type
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Checkpoints cleared successfully
        '400':
          description: Invalid query parameters
        '404':
          description: Peer could not be resolved to a known chat
