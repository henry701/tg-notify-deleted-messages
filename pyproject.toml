[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["app/src"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.coverage.run]
source = ["app/src"]
branch = true
omit = [
    "app/src/wsgi.py",
    "*/tests/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
fail_under = 0

[tool.coverage.html]
directory = "htmlcov"
